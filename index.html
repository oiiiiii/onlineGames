<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线游戏管理</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        :root {
            --primary: #4F46E5;
            --primary-light: #6366F1;
            --secondary: #10B981;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            --white: #FFFFFF;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius: 8px;
            --radius-lg: 12px;
            --transition: all 0.3s ease;
        }
        
        body {
            background-color: var(--gray-100);
            color: var(--gray-900);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        
        header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            font-size: 1.125rem;
            color: var(--gray-700);
            margin-bottom: 2rem;
        }
        
        .search-container {
            max-width: 600px;
            margin: 0 auto 3rem;
            position: relative;
        }
        
        #search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-lg);
            font-size: 1rem;
            transition: var(--transition);
        }
        
        #search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        .search-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
        }
        
        .filter-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 2rem;
            justify-content: center;
        }
        
        .filter-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--gray-300);
            background-color: var(--white);
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.875rem;
        }
        
        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .filter-btn.active {
            background-color: var(--primary);
            color: var(--white);
            border-color: var(--primary);
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        
        .game-card {
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: var(--transition);
            min-height: 150px;
        }
        
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }
        
        .game-card a {
            display: block;
            text-decoration: none;
            color: var(--gray-900);
            padding: 1.5rem;
            height: 100%;
        }
        
        .game-content {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .game-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .game-description {
            font-size: 0.875rem;
            color: var(--gray-600);
            margin-bottom: 1rem;
        }
        
        .game-category {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 9999px;
            font-size: 0.75rem;
            color: var(--gray-700);
            max-width: fit-content;
        }
        
        footer {
            text-align: center;
            padding: 2rem 0;
            color: var(--gray-600);
            font-size: 0.875rem;
            border-top: 1px solid var(--gray-200);
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background-color: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
        }
        
        .empty-state-icon {
            font-size: 4rem;
            color: var(--gray-300);
            margin-bottom: 1rem;
        }
        
        .empty-state-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }
        
        .empty-state-description {
            color: var(--gray-600);
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 1rem;
            }
            
            .game-card a {
                padding: 1.25rem;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 1.5rem 1rem;
            }
            
            h1 {
                font-size: 1.75rem;
            }
            
            .games-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>在线游戏管理</h1>
            <p class="subtitle">探索我们的游戏集合，享受休闲娱乐时光</p>
        </header>
        
        <div class="search-container">
            <input type="text" id="search-input" placeholder="搜索游戏...">
            <span class="search-icon">🔍</span>
        </div>
        
        <div class="filter-container">
            <button class="filter-btn active" data-category="all">全部</button>
            <button class="filter-btn" data-category="board">棋盘游戏</button>
            <button class="filter-btn" data-category="puzzle">益智游戏</button>
            <button class="filter-btn" data-category="action">动作游戏</button>
        </div>
        
        <div class="games-grid" id="games-grid"></div>
    </div>
    
    <footer>
        <p>部署于 Cloudflare Pages</p>
    </footer>
    
    <script>
        // 游戏数据
        const games = [
            {
                id: 'gomoku',
                name: '五子棋',
                description: '经典的五子棋游戏，支持人机对战和人人对战',
                category: 'board',
                icon: '♟️',
                path: './Gomoku/',
                iconClass: 'gomoku-icon'
            },
            {
                id: 'xiangqi',
                name: '中国象棋',
                description: '经典的中国象棋游戏，支持人机对战和人人对战',
                category: 'board',
                icon: '♜',
                path: './Xiangqi/',
                iconClass: 'xiangqi-icon'
            },
            {
                id: 'jungle',
                name: '斗兽棋',
                description: '暗翻斗兽棋游戏，支持双人对战',
                category: 'board',
                icon: '🦁',
                path: './Jungle/',
                iconClass: 'jungle-icon'
            },
            {
                id: 'minesweeper',
                name: '扫雷',
                description: '经典的扫雷游戏，支持不同难度级别',
                category: 'puzzle',
                icon: '💣',
                path: './Minesweeper/',
                iconClass: 'minesweeper-icon'
            },
            {
                id: 'go',
                name: '围棋',
                description: '经典的围棋游戏，仅支持人人对战，不支持人机对战，不太推荐玩这个网页版的',
                category: 'board',
                icon: '⚪',
                path: './Go/',
                iconClass: 'go-icon'
            },
            {
                id: 'schulte',
                name: '舒尔特表',
                description: '注意力训练工具，支持3×3到9×9不同难度',
                category: 'puzzle',
                icon: '📊',
                path: './Schulte/',
                iconClass: 'schulte-icon'
            }
        ];
        
        // DOM 元素
        const searchInput = document.getElementById('search-input');
        const filterButtons = document.querySelectorAll('.filter-btn');
        const gamesGrid = document.getElementById('games-grid');
        
        // 生成随机渐变色
        function getRandomGradient() {
            const gradients = [
                'linear-gradient(135deg, #F3E8FF 0%, #EDE9FE 100%)', // 紫色渐变
                'linear-gradient(135deg, #DBEAFE 0%, #BFDBFE 100%)', // 蓝色渐变
                'linear-gradient(135deg, #FCE7F3 0%, #FBCFE8 100%)', // 粉色渐变
                'linear-gradient(135deg, #DCFCE7 0%, #BBF7D0 100%)', // 绿色渐变
                'linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%)', // 黄色渐变
                'linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%)', // 靛蓝渐变
                'linear-gradient(135deg, #F0F9FF 0%, #E0F2FE 100%)', // 天蓝色渐变
                'linear-gradient(135deg, #FEF2F2 0%, #FECACA 100%)'  // 红色渐变
            ];
            return gradients[Math.floor(Math.random() * gradients.length)];
        }
        
        // 渲染游戏卡片
        function renderGames(gamesToRender) {
            if (gamesToRender.length === 0) {
                gamesGrid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <h3 class="empty-state-title">未找到匹配的游戏</h3>
                        <p class="empty-state-description">请尝试使用其他关键词或筛选条件</p>
                    </div>
                `;
                return;
            }
            
            gamesGrid.innerHTML = gamesToRender.map(game => {
                const randomGradient = getRandomGradient();
                return `
                    <div class="game-card" data-category="${game.category}" style="background: ${randomGradient};">
                        <a href="${game.path}">
                            <div class="game-content">
                                <h3 class="game-title" style="display: flex; align-items: center; gap: 8px;">
                                    <span style="font-size: 1.5rem;">${game.icon}</span>
                                    ${game.name}
                                </h3>
                                <p class="game-description">${game.description}</p>
                                <span class="game-category">${getCategoryName(game.category)}</span>
                            </div>
                        </a>
                    </div>
                `;
            }).join('');
        }
        
        // 获取分类名称
        function getCategoryName(category) {
            const categoryMap = {
                'board': '棋盘游戏',
                'puzzle': '益智游戏',
                'action': '动作游戏'
            };
            return categoryMap[category] || category;
        }
        
        // 筛选游戏
        function filterGames() {
            const searchTerm = searchInput.value.toLowerCase();
            const activeCategory = document.querySelector('.filter-btn.active').dataset.category;
            
            const filteredGames = games.filter(game => {
                const matchesSearch = game.name.toLowerCase().includes(searchTerm) || 
                                     game.description.toLowerCase().includes(searchTerm);
                const matchesCategory = activeCategory === 'all' || game.category === activeCategory;
                return matchesSearch && matchesCategory;
            });
            
            renderGames(filteredGames);
        }
        
        // 事件监听
        searchInput.addEventListener('input', filterGames);
        
        filterButtons.forEach(button => {
            button.addEventListener('click', () => {
                // 更新活动按钮
                filterButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                
                // 筛选游戏
                filterGames();
            });
        });
        
        // 初始化
        renderGames(games);
    </script>
</body>
</html>
