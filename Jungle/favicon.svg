<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- 棋盘背景（浅棕色） -->
  <rect width="32" height="32" rx="2" ry="2" fill="#f5e8d0"/>
  <!-- 边框 -->
  <rect x="1" y="1" width="30" height="30" rx="1.5" ry="1.5" fill="none" stroke="#8b5a2b" stroke-width="1.5"/>
  
  <!-- 大象轮廓（代表斗兽棋的高阶棋子） -->
  <path d="M8,12 C8,9 11,7 14,7 C17,7 20,9 20,12 C20,14 18,16 16,16 C14,16 12,14 12,12" fill="#8b7355" stroke="#5c4033" stroke-width="1"/>
  <circle cx="14" cy="10" r="1" fill="#5c4033"/>
  <circle cx="18" cy="10" r="1" fill="#5c4033"/>
  
  <!-- 老鼠轮廓（代表斗兽棋的低阶棋子） -->
  <path d="M22,20 C20,20 19,22 19,24 C19,26 20,27 22,27 C24,27 25,26 25,24 C25,22 24,20 22,20" fill="#d2b48c" stroke="#5c4033" stroke-width="1"/>
  <circle cx="21" cy="23" r="0.5" fill="#5c4033"/>
  <circle cx="23" cy="23" r="0.5" fill="#5c4033"/>
  
  <!-- 棋盘格子线条 -->
  <line x1="8" y1="8" x2="24" y2="8" stroke="#8b5a2b" stroke-width="0.5" stroke-dasharray="2,1"/>
  <line x1="8" y1="24" x2="24" y2="24" stroke="#8b5a2b" stroke-width="0.5" stroke-dasharray="2,1"/>
  <line x1="8" y1="8" x2="8" y2="24" stroke="#8b5a2b" stroke-width="0.5" stroke-dasharray="2,1"/>
  <line x1="24" y1="8" x2="24" y2="24" stroke="#8b5a2b" stroke-width="0.5" stroke-dasharray="2,1"/>
</svg>