<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舒尔特表</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #4a6fa5, #1a365d);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', sans-serif;
            padding: 20px;
        }

        .game-layout {
            display: flex;
            align-items: stretch;
            justify-content: center;
            gap: 28px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .control-panel {
            width: 320px;
            background: rgba(35, 35, 45, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 30px 20px;
            color: #f0e9e0;
            box-shadow: 0 20px 30px -8px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,215,140,0.2) inset;
            border: 1px solid rgba(255, 215, 150, 0.3);
            display: flex;
            flex-direction: column;
            gap: 18px;
            max-height: 90vh;
        }



        .board-wrapper {
            background: rgba(35, 35, 45, 0.85);
            border-radius: 36px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            border: 2px solid #c9a468;
            padding: 20px;
            box-sizing: border-box;
        }

        /* PC端适配 */
        @media (min-width: 769px) {
            .board-wrapper {
                height: calc(100vh - 40px);
                max-height: 800px;
                width: calc(100vh - 40px);
                max-width: 800px;
                min-width: 500px;
                min-height: 500px;
            }
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .board-wrapper {
                width: 100vw;
                max-width: 100%;
                max-height: 100vh;
            }
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 20px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(201, 164, 104, 0.5);
            box-sizing: border-box;
        }

        .timer-container {
            margin-bottom: 15px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .timer-container .timer-display {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            background: rgba(20, 20, 30, 0.9);
            padding: 8px 24px;
            border-radius: 60px;
            border: 2px solid #c9a468;
            box-shadow: 0 4px 0 #18181e, 0 3px 8px rgba(0,0,0,0.3);
            white-space: nowrap;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .timer-container .button-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .timer-container .icon-btn {
            width: 40px;
            height: 40px;
            background: rgba(20, 20, 30, 0.9);
            border: 2px solid #c9a468;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 0 #18181e, 0 2px 8px rgba(0,0,0,0.3);
        }

        .timer-container .icon-btn:hover {
            background: #4a4a5a;
            border-color: #dbb27c;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #18181e, 0 4px 12px rgba(0,0,0,0.3);
        }

        .timer-container .icon-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #18181e;
        }

        .timer-container .icon-btn img {
            width: 24px;
            height: 24px;
        }

        .schulte-board {
            display: grid;
            gap: 8px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 24px;
            box-shadow: inset 0 0 0 2px #ccc, 0 10px 20px rgba(0,0,0,0.2);
            border: 2px solid #ccc;
            box-sizing: border-box;
        }

        .schulte-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border-radius: 12px;
            font-size: clamp(10px, 3vw, 20px);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 #ddd, 0 2px 8px rgba(0,0,0,0.1);
            aspect-ratio: 1;
            box-sizing: border-box;
        }

        .schulte-cell:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #ddd, 0 4px 12px rgba(0,0,0,0.15);
        }

        .schulte-cell:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #ddd, 0 2px 8px rgba(0,0,0,0.1);
        }

        .schulte-cell.correct {
            color: white;
        }

        .panel-title {
            font-size: 34px;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #fde6b6, #dba870);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            text-shadow: 0 2px 5px #00000050;
        }

        .group-title {
            font-size: 20px;
            font-weight: 600;
            color: #eddabc;
            margin: 8px 0 6px 6px;
            letter-spacing: 1px;
            border-left: 6px solid #e6b567;
            padding-left: 12px;
            text-transform: uppercase;
        }

        .button-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .btn {
            background: #2f2f3a;
            border: 2px solid #7e6b5a;
            color: #f2e3cf;
            font-size: 18px;
            font-weight: 600;
            padding: 14px 8px;
            border-radius: 60px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 6px 0 #1a1a22, 0 4px 12px black;
            flex: 1 1 0px;
            min-width: 100px;
            backdrop-filter: blur(4px);
            letter-spacing: 0.8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-decoration: none;
        }

        .btn.small {
            font-size: 16px;
            padding: 12px 6px;
            min-width: 80px;
        }

        .btn.active {
            background: #3c6e8f;
            border-color: #ffcf9a;
            box-shadow: 0 6px 0 #1d404b, 0 4px 12px black;
            color: white;
        }

        .btn:hover {
            background: #4a4a5a;
            border-color: #dbb27c;
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #1a1a22, 0 8px 16px black;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1a1a22;
        }

        .difficulty-buttons,
        .color-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin: 10px 0;
        }

        .difficulty-btn {
            background: #2f2f3a;
            border: 2px solid #7e6b5a;
            color: #f2e3cf;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 4px;
            border-radius: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 0 #1a1a22, 0 2px 8px black;
        }

        .difficulty-btn.active {
            background: #3c6e8f;
            border-color: #ffcf9a;
            box-shadow: 0 4px 0 #1d404b, 0 2px 8px black;
            color: white;
        }

        .status-area {
            font-size: 30px;
            font-weight: 700;
            text-align: center;
            background: #2b2b38cc;
            border-radius: 60px;
            padding: 22px 8px;
            margin: 10px 0 14px 0;
            border: 2px solid #c9a468;
            box-shadow: inset 0 2px 6px #00000060, 0 6px 0 #18181e;
            color: #fff2d4;
            backdrop-filter: blur(4px);
        }

        .timer-display {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            color: #ffd700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            margin: 10px 0;
        }

        .color-picker-container {
            margin: 10px 0;
        }

        .color-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .color-btn-container {
            flex: 1;
            position: relative;
        }

        .color-input {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 2;
        }

        .color-btn {
            width: 100%;
            height: 48px;
            background: #4caf50;
            color: white;
            z-index: 1;
        }

        .info-section {
            background: #2d2d3a;
            border-radius: 36px;
            padding: 20px;
            font-size: 14px;
            line-height: 1.6;
            color: #f2e3cf;
            border: 1px solid #b5976b;
            margin-top: 20px;
        }

        .info-section h3 {
            color: #fde6b6;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .info-section p {
            margin-bottom: 10px;
        }

        @media (max-width: 1024px) {
            .game-layout {
                flex-wrap: wrap;
            }
            .control-panel {
                width: 320px;
                max-height: none;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .game-layout {
                gap: 15px;
            }
            
            .control-panel {
                width: 100%;
                max-width: 400px;
                padding: 20px 15px;
                border-radius: 32px;
            }
            
            .panel-title {
                font-size: 28px;
            }
            
            .group-title {
                font-size: 18px;
            }
            
            .btn {
                font-size: 16px;
                padding: 12px 6px;
            }
            
            .btn.small {
                font-size: 14px;
                padding: 10px 4px;
            }
            
            .status-area {
                font-size: 24px;
                padding: 18px 6px;
            }
            
            .timer-display {
                font-size: 36px;
            }
            
            .schulte-board {
                padding: 15px;
                gap: 8px;
            }
            
            .schulte-cell {
                font-size: 18px;
                border-radius: 8px;
            }
        }

        @media (max-width: 768px) {
            .board-wrapper {
                width: 400px;
                height: 450px;
                padding: 15px;
            }
            
            .game-container {
                padding: 15px;
            }
            
            .timer-container {
                height: 50px;
                margin-bottom: 15px;
            }
            
            .timer-container .timer-display {
                font-size: 24px;
                padding: 8px 24px;
                height: 40px;
            }
            
            .schulte-board {
                height: calc(100% - 70px);
                padding: 15px;
                gap: 8px;
            }
            
            .schulte-cell {
                font-size: clamp(10px, 3vw, 20px);
            }
        }

        @media (max-width: 480px) {
            .control-panel {
                padding: 15px 10px;
                border-radius: 24px;
            }
            
            .panel-title {
                font-size: 24px;
            }
            
            .group-title {
                font-size: 16px;
            }
            
            .btn {
                font-size: 14px;
                padding: 10px 4px;
            }
            
            .btn.small {
                font-size: 12px;
                padding: 8px 3px;
            }
            
            .status-area {
                font-size: 20px;
                padding: 14px 4px;
            }
            
            .board-wrapper {
                width: 300px;
                height: 350px;
                padding: 10px;
            }
            
            .game-container {
                padding: 10px;
            }
            
            .timer-container {
                height: 40px;
                margin-bottom: 10px;
            }
            
            .timer-container .timer-display {
                font-size: 20px;
                padding: 6px 20px;
                height: 35px;
            }
            
            .schulte-board {
                height: calc(100% - 60px);
                padding: 10px;
                gap: 6px;
            }
            
            .schulte-cell {
                font-size: clamp(8px, 4vw, 16px);
                border-radius: 6px;
            }
        }
        
        /* 悬浮窗样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }
        
        .modal-content {
            background-color: rgba(35, 35, 45, 0.95);
            margin: 15% auto;
            padding: 20px;
            border: 2px solid #c9a468;
            border-radius: 36px;
            width: 80%;
            max-width: 600px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5);
            color: #f2e3cf;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(201, 164, 104, 0.3);
        }
        
        .modal-header h2 {
            font-size: 24px;
            font-weight: 700;
            color: #fde6b6;
        }
        
        .close-btn {
            color: #f2e3cf;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            background: none;
            border: none;
        }
        
        .close-btn:hover,
        .close-btn:focus {
            color: #ffd700;
            text-decoration: none;
            cursor: pointer;
        }
        
        .modal-body {
            font-size: 14px;
            line-height: 1.6;
        }
        
        .modal-body h3 {
            color: #fde6b6;
            margin: 15px 0 10px 0;
            font-size: 16px;
        }
        
        .modal-body p {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="game-layout">
        <!-- 左侧控制面板 -->
        <div class="control-panel left-panel">
            <div class="panel-title">舒尔特表</div>
            
            <div class="group-title">难度</div>
            <div class="difficulty-buttons" id="difficultyButtons">
                <button class="difficulty-btn active" data-size="3">3×3</button>
                <button class="difficulty-btn" data-size="4">4×4</button>
                <button class="difficulty-btn" data-size="5">5×5</button>
                <button class="difficulty-btn" data-size="6">6×6</button>
                <button class="difficulty-btn" data-size="7">7×7</button>
                <button class="difficulty-btn" data-size="8">8×8</button>
                <button class="difficulty-btn" data-size="9">9×9</button>
            </div>
            
            <div class="group-title">颜色</div>
            <div class="color-picker-container">
                <div class="color-controls">
                    <button class="btn small" id="noColorBtn">不变色</button>
                    <div class="color-btn-container">
                        <input type="color" id="colorPicker" value="#4caf50" class="color-input">
                        <button class="btn small color-btn" id="colorBtn">选择颜色</button>
                    </div>
                </div>
            </div>
            
            <div class="button-row">
                <button class="btn" id="infoBtn">舒尔特表介绍</button>
            </div>
            
            <div class="button-row">
                <a href="https://www.52pojie.cn/" target="_blank" style="text-decoration: none; flex: 1;">
                    <div class="btn">作者链接</div>
                </a>
            </div>
        </div>
        
        <!-- 悬浮窗 -->
        <div class="modal" id="infoModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>舒尔特表介绍</h2>
                    <button class="close-btn" id="closeModal">&times;</button>
                </div>
                <div class="modal-body">
                    <h3>什么是舒尔特表？</h3>
                    <p>舒尔特表是一种用于训练注意力和视觉搜索能力的工具，由德国心理学家舒尔特发明。</p>
                    
                    <h3>如何使用？</h3>
                    <p>1. 选择合适的难度（3×3到9×9）</p>
                    <p>2. 点击「生成新表」按钮</p>
                    <p>3. 从1开始，按顺序点击所有数字</p>
                    <p>4. 完成后查看用时，挑战自己的极限</p>
                    
                    <h3>训练效果</h3>
                    <p>• 提高注意力集中度</p>
                    <p>• 增强视觉搜索能力</p>
                    <p>• 提升反应速度</p>
                    <p>• 改善手眼协调能力</p>
                </div>
            </div>
        </div>

        <!-- 中央舒尔特表 -->
        <div class="board-wrapper">
            <div class="game-container">
                <div class="timer-container">
                    <div class="timer-display" id="timerDisplay">00.00</div>
                    <div class="button-group">
                        <button class="icon-btn" id="generateBtn">
                            <img src="./start.svg" alt="开始">
                        </button>
                        <button class="icon-btn" id="resetBtn">
                            <img src="./restart.svg" alt="重置">
                        </button>
                    </div>
                </div>
                <div class="schulte-board" id="schulteBoard"></div>
            </div>
        </div>


    </div>

    <script>
        (function() {
            // 游戏状态
            let currentSize = 3;
            let currentColor = '#4caf50';
            let useColor = true;
            let currentNumber = 1;
            let startTime = null;
            let timerInterval = null;
            let isPlaying = false;
            
            // DOM 元素
            const schulteBoard = document.getElementById('schulteBoard');
            const timerDisplay = document.getElementById('timerDisplay');
            const generateBtn = document.getElementById('generateBtn');
            const startBtn = document.getElementById('startBtn');
            const resetBtn = document.getElementById('resetBtn');
            const difficultyButtons = document.getElementById('difficultyButtons');
            const colorPicker = document.getElementById('colorPicker');
            const noColorBtn = document.getElementById('noColorBtn');
            const colorBtn = document.getElementById('colorBtn');
            const infoBtn = document.getElementById('infoBtn');
            const infoModal = document.getElementById('infoModal');
            const closeModal = document.getElementById('closeModal');
            
            // 生成舒尔特表
            function generateSchulteTable() {
                // 清空棋盘
                schulteBoard.innerHTML = '';
                
                // 重新计算尺寸
                calculateBoardSize();
                
                // 设置网格布局
                schulteBoard.style.gridTemplateColumns = `repeat(${currentSize}, 1fr)`;
                schulteBoard.style.gridTemplateRows = `repeat(${currentSize}, 1fr)`;
                
                // 生成数字数组并打乱
                const numbers = [];
                const total = currentSize * currentSize;
                for (let i = 1; i <= total; i++) {
                    numbers.push(i);
                }
                // 打乱数组
                for (let i = numbers.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
                }
                
                // 创建单元格
                numbers.forEach(num => {
                    const cell = document.createElement('div');
                    cell.className = 'schulte-cell';
                    cell.textContent = num;
                    cell.addEventListener('click', () => handleCellClick(num, cell));
                    schulteBoard.appendChild(cell);
                });
                
                // 重置游戏状态
                currentNumber = 1;
            }
            
            // 处理单元格点击
            function handleCellClick(num, cell) {
                if (!isPlaying) return;
                
                if (num === currentNumber) {
                    // 正确点击
                    // 应用选择的颜色（如果启用）
                    if (useColor) {
                        cell.classList.add('correct');
                        cell.style.backgroundColor = currentColor;
                    }
                    currentNumber++;
                    
                    const total = currentSize * currentSize;
                    if (currentNumber > total) {
                        // 完成
                        stopTimer();
                        isPlaying = false;
                    }
                }
            }
            
            // 开始计时
            function startTimer() {
                // 清除之前的计时器
                if (timerInterval) {
                    clearInterval(timerInterval);
                }
                
                startTime = Date.now();
                isPlaying = true;
                
                timerInterval = setInterval(() => {
                    const elapsed = (Date.now() - startTime) / 1000;
                    timerDisplay.textContent = elapsed.toFixed(2);
                }, 10);
            }
            
            // 停止计时
            function stopTimer() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
            }
            
            // 重置游戏
            function resetGame() {
                stopTimer();
                timerDisplay.textContent = '00.00';
                currentNumber = 1;
                isPlaying = false;
                schulteBoard.innerHTML = '';
            }
            
            // 事件绑定
            generateBtn.addEventListener('click', () => {
                generateSchulteTable();
                startTimer();
            });
            resetBtn.addEventListener('click', resetGame);
            
            // 难度选择
            difficultyButtons.addEventListener('click', (e) => {
                if (e.target.classList.contains('difficulty-btn')) {
                    // 移除所有活动状态
                    document.querySelectorAll('.difficulty-btn').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    // 添加当前活动状态
                    e.target.classList.add('active');
                    // 更新难度
                    currentSize = parseInt(e.target.dataset.size);
                    // 清空棋盘，保持白板状态
                    schulteBoard.innerHTML = '';
                    // 重置计时器
                    stopTimer();
                    timerDisplay.textContent = '00.00';
                    // 重新计算尺寸
                    calculateBoardSize();
                }
            });
            
            // 颜色选择
            colorPicker.addEventListener('input', (e) => {
                currentColor = e.target.value;
                colorBtn.style.backgroundColor = currentColor;
                useColor = true;
                noColorBtn.classList.remove('active');
            });
            
            // 不变色按钮
            noColorBtn.addEventListener('click', () => {
                useColor = !useColor;
                if (useColor) {
                    noColorBtn.classList.remove('active');
                } else {
                    noColorBtn.classList.add('active');
                }
            });
            
            // 舒尔特表介绍按钮
            infoBtn.addEventListener('click', () => {
                infoModal.style.display = 'block';
            });
            
            // 关闭按钮
            closeModal.addEventListener('click', () => {
                infoModal.style.display = 'none';
            });
            
            // 点击模态框外部关闭
            window.addEventListener('click', (e) => {
                if (e.target === infoModal) {
                    infoModal.style.display = 'none';
                }
            });
            
            // 计算和设置舒尔特表尺寸
            function calculateBoardSize() {
                const boardWrapper = document.querySelector('.board-wrapper');
                const gameContainer = document.querySelector('.game-container');
                const timerContainer = document.querySelector('.timer-container');
                
                // 检查是否为移动端
                const isMobile = window.innerWidth <= 768;
                
                // 获取game-container的padding
                const gameContainerStyle = window.getComputedStyle(gameContainer);
                const gameContainerPaddingTop = parseFloat(gameContainerStyle.paddingTop);
                const gameContainerPaddingBottom = parseFloat(gameContainerStyle.paddingBottom);
                
                // 获取timer-container的高度和margin
                const timerStyle = window.getComputedStyle(timerContainer);
                const timerHeight = timerContainer.clientHeight;
                const timerMarginBottom = parseFloat(timerStyle.marginBottom);
                
                if (isMobile) {
                    // 移动端适配：宽度设置为屏幕宽度
                    const screenWidth = window.innerWidth;
                    boardWrapper.style.width = `${screenWidth}px`;
                    
                    // 计算schulte-board的尺寸
                    const boardSize = screenWidth - 40; // 20px padding on left and right of board-wrapper
                    
                    // 设置schulte-board的尺寸
                    schulteBoard.style.width = `${boardSize}px`;
                    schulteBoard.style.height = `${boardSize}px`;
                    
                    // 计算board-wrapper的高度，包含timer-container的高度
                    const boardWrapperHeight = boardSize + 40 + timerHeight + timerMarginBottom + gameContainerPaddingTop + gameContainerPaddingBottom;
                    boardWrapper.style.height = `${boardWrapperHeight}px`;
                } else {
                    // PC端适配
                    // 获取board-wrapper的尺寸
                    const wrapperWidth = boardWrapper.clientWidth;
                    const wrapperHeight = boardWrapper.clientHeight;
                    
                    // 计算schulte-board的可用空间
                    const availableWidth = wrapperWidth - 40; // 20px padding on left and right of board-wrapper
                    const availableHeight = wrapperHeight - 40 - timerHeight - timerMarginBottom - gameContainerPaddingTop - gameContainerPaddingBottom;
                    
                    // 计算schulte-board的尺寸，确保为正方形
                    const boardSize = Math.min(availableWidth, availableHeight);
                    
                    // 设置schulte-board的尺寸
                    schulteBoard.style.width = `${boardSize}px`;
                    schulteBoard.style.height = `${boardSize}px`;
                }
            }
            
            // 初始化
            function init() {
                // 设置颜色按钮的初始背景颜色
                colorBtn.style.backgroundColor = currentColor;
                // 清空棋盘，保持白板状态
                schulteBoard.innerHTML = '';
                // 计算和设置舒尔特表尺寸
                calculateBoardSize();
            }
            
            // 监听窗口大小变化
            window.addEventListener('resize', calculateBoardSize);
            
            // 初始化
            init();
        })();
    </script>
</body>
</html>
