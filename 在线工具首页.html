<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线工具导航</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        :root {
            --primary: #4F46E5;
            --primary-light: #6366F1;
            --secondary: #10B981;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;
            --white: #FFFFFF;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius: 8px;
            --radius-lg: 12px;
            --transition: all 0.3s ease;
        }
        
        body {
            background-color: var(--gray-100);
            color: var(--gray-900);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        
        header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            font-size: 1.125rem;
            color: var(--gray-700);
            margin-bottom: 2rem;
        }
        
        .search-container {
            max-width: 600px;
            margin: 0 auto 3rem;
            position: relative;
        }
        
        #search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-lg);
            font-size: 1rem;
            transition: var(--transition);
        }
        
        #search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        .search-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
        }
        
        .filter-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 2rem;
            justify-content: center;
        }
        
        .filter-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--gray-300);
            background-color: var(--white);
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.875rem;
        }
        
        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .filter-btn.active {
            background-color: var(--primary);
            color: var(--white);
            border-color: var(--primary);
        }
        
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        
        .tool-card {
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: var(--transition);
            min-height: 150px;
        }
        
        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }
        
        .tool-card a {
            display: block;
            text-decoration: none;
            color: var(--gray-900);
            padding: 1.5rem;
            height: 100%;
        }
        
        .tool-content {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .tool-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .tool-description {
            font-size: 0.875rem;
            color: var(--gray-600);
            margin-bottom: 1rem;
        }
        
        .tool-category {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 9999px;
            font-size: 0.75rem;
            color: var(--gray-700);
            max-width: fit-content;
        }
        

        
        footer {
            text-align: center;
            padding: 2rem 0;
            color: var(--gray-600);
            font-size: 0.875rem;
            border-top: 1px solid var(--gray-200);
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background-color: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
        }
        
        .empty-state-icon {
            font-size: 4rem;
            color: var(--gray-300);
            margin-bottom: 1rem;
        }
        
        .empty-state-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }
        
        .empty-state-description {
            color: var(--gray-600);
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .tools-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 1rem;
            }
            
            .tool-card a {
                padding: 1.25rem;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 1.5rem 1rem;
            }
            
            h1 {
                font-size: 1.75rem;
            }
            
            .tools-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>在线工具导航</h1>
            <p class="subtitle">探索我们的工具集，提高您的工作效率</p>
        </header>
        
        <div class="search-container">
            <input type="text" id="search-input" placeholder="搜索工具...">
            <span class="search-icon">🔍</span>
        </div>
        
        <div class="filter-container">
            <button class="filter-btn active" data-category="all">全部</button>
            <button class="filter-btn" data-category="editor">编辑器</button>
            <button class="filter-btn" data-category="converter">转换器</button>
            <button class="filter-btn" data-category="utility">实用工具</button>
        </div>
        
        <div class="tools-grid" id="tools-grid"></div>
    </div>
    
    <footer>
        <p>部署于 Cloudflare Pages</p>
    </footer>
    
    <script>
        // 工具数据
        const tools = [
            {
                id: 'mermaid',
                name: 'Mermaid 在线编辑器',
                description: '使用 Mermaid 语法创建流程图、时序图等图表',
                category: 'editor',
                icon: '📊',
                path: './mermaid/',
                iconClass: 'mermaid-icon'
            },
            {
                id: 'svg',
                name: 'SVG 在线编辑器',
                description: '创建和编辑 SVG 矢量图形',
                category: 'editor',
                icon: '🎨',
                path: './svg/',
                iconClass: 'svg-icon'
            },
            {
                id: 'picmerge',
                name: '在线图片合并器',
                description: '将多张图片合并为一张',
                category: 'utility',
                icon: '🖼️',
                path: './picmerge/',
                iconClass: 'picmerge-icon'
            },
            {
                id: 'appguide',
                name: '应用创建向导',
                description: '引导您创建应用程序',
                category: 'utility',
                icon: '🚀',
                path: './appguide/',
                iconClass: 'appguide-icon'
            },
            {
                id: 'img2ico',
                name: '图片转ICO工具',
                description: '将图片转换为 ICO 图标格式',
                category: 'converter',
                icon: '🖼️➡️🏷️',
                path: './img2ico/',
                iconClass: 'img2ico-icon'
            },
            {
                id: 'exmusic',
                name: '音乐格式转换',
                description: '转换音频文件格式',
                category: 'converter',
                icon: '🎵🔄',
                path: './exmusic/',
                iconClass: 'exmusic-icon'
            },
            {
                id: 'lrc2srt',
                name: '歌词转字幕工具',
                description: '将 LRC 歌词转换为 SRT 字幕',
                category: 'converter',
                icon: '📝➡️📺',
                path: './lrc2srt/',
                iconClass: 'lrc2srt-icon'
            },
            {
                id: 'xcode',
                name: '二维码/条形码生成器',
                description: '将文字转换为二维码或条形码，并保存为PNG格式',
                category: 'converter',
                icon: '📱📷',
                path: './xcode/',
                iconClass: 'xcode-icon'
            }
        ];
        
        // DOM 元素
        const searchInput = document.getElementById('search-input');
        const filterButtons = document.querySelectorAll('.filter-btn');
        const toolsGrid = document.getElementById('tools-grid');
        
        // 生成随机渐变色
        function getRandomGradient() {
            const gradients = [
                'linear-gradient(135deg, #F3E8FF 0%, #EDE9FE 100%)', // 紫色渐变
                'linear-gradient(135deg, #DBEAFE 0%, #BFDBFE 100%)', // 蓝色渐变
                'linear-gradient(135deg, #FCE7F3 0%, #FBCFE8 100%)', // 粉色渐变
                'linear-gradient(135deg, #DCFCE7 0%, #BBF7D0 100%)', // 绿色渐变
                'linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%)', // 黄色渐变
                'linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%)', // 靛蓝渐变
                'linear-gradient(135deg, #F0F9FF 0%, #E0F2FE 100%)', // 天蓝色渐变
                'linear-gradient(135deg, #FEF2F2 0%, #FECACA 100%)'  // 红色渐变
            ];
            return gradients[Math.floor(Math.random() * gradients.length)];
        }
        
        // 渲染工具卡片
        function renderTools(toolsToRender) {
            if (toolsToRender.length === 0) {
                toolsGrid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <h3 class="empty-state-title">未找到匹配的工具</h3>
                        <p class="empty-state-description">请尝试使用其他关键词或筛选条件</p>
                    </div>
                `;
                return;
            }
            
            toolsGrid.innerHTML = toolsToRender.map(tool => {
                const randomGradient = getRandomGradient();
                return `
                    <div class="tool-card" data-category="${tool.category}" style="background: ${randomGradient};">
                        <a href="${tool.path}">
                            <div class="tool-content">
                                <h3 class="tool-title">${tool.name}</h3>
                                <p class="tool-description">${tool.description}</p>
                                <span class="tool-category">${getCategoryName(tool.category)}</span>
                            </div>
                        </a>
                    </div>
                `;
            }).join('');
        }
        
        // 获取分类名称
        function getCategoryName(category) {
            const categoryMap = {
                'editor': '编辑器',
                'converter': '转换器',
                'utility': '实用工具'
            };
            return categoryMap[category] || category;
        }
        
        // 筛选工具
        function filterTools() {
            const searchTerm = searchInput.value.toLowerCase();
            const activeCategory = document.querySelector('.filter-btn.active').dataset.category;
            
            const filteredTools = tools.filter(tool => {
                const matchesSearch = tool.name.toLowerCase().includes(searchTerm) || 
                                     tool.description.toLowerCase().includes(searchTerm);
                const matchesCategory = activeCategory === 'all' || tool.category === activeCategory;
                return matchesSearch && matchesCategory;
            });
            
            renderTools(filteredTools);
        }
        
        // 事件监听
        searchInput.addEventListener('input', filterTools);
        
        filterButtons.forEach(button => {
            button.addEventListener('click', () => {
                // 更新活动按钮
                filterButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                
                // 筛选工具
                filterTools();
            });
        });
        
        // 初始化
        renderTools(tools);
    </script>
</body>
</html>
