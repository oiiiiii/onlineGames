<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典扫雷专业版2.0</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <style>

        * {
            user-select: none;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #1f2c3a 0%, #15232e 100%);
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        .game-layout {
            display: flex;
            align-items: stretch;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .control-panel {
            width: 280px;
            background: rgba(35, 35, 45, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 30px 20px;
            color: #f0e9e0;
            box-shadow: 0 20px 30px -8px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,215,140,0.2) inset;
            border: 1px solid rgba(255, 215, 150, 0.3);
            display: flex;
            flex-direction: column;
            gap: 18px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .panel-title {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #fde6b6, #dba870);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 2px 5px #00000050;
        }
        
        .group-title {
            font-size: 18px;
            font-weight: 600;
            color: #eddabc;
            margin: 8px 0 6px 6px;
            letter-spacing: 1px;
            border-left: 6px solid #e6b567;
            padding-left: 12px;
        }
        
        .button-row {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        
        .btn {
            background: linear-gradient(145deg, #2e4357, #1b2a38);
            border: none;
            border-radius: 60px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            color: #e2f0fa;
            cursor: pointer;
            box-shadow: 0 6px 0 #0d1a22, 0 6px 16px rgba(0,0,0,0.4);
            transition: 0.08s linear;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        
        .btn.full-width {
            width: 100%;
            justify-content: center;
            text-align: center;
        }
        
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0d1a22, 0 6px 16px rgba(0,0,0,0.4);
        }
        
        .btn.small {
            padding: 8px 16px;
            font-size: 14px;
        }
        
        .btn.full-width {
            width: 100%;
            justify-content: center;
        }
        
        .status-area {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        #Mclear {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 36px;
            padding: 24px 20px;
            box-shadow: 0 25px 40px -10px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.06);
            display: inline-block;
            flex: 0 0 auto;
        }
        
        .title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(20, 30, 40, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 6px 12px 6px 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 12px -8px rgba(0,0,0,0.4);
        }
        
        #time, #tabnum {
            background: rgba(0, 0, 0, 0.25);
            color: #b7e4fa;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-weight: 500;
            font-size: 26px;
            padding: 4px 14px;
            border-radius: 40px;
            letter-spacing: 2px;
            text-shadow: 0 0 6px #2ad4ff;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.4), 0 2px 0 rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            min-width: 85px;
            text-align: center;
            backdrop-filter: blur(4px);
        }
        
        #modeToggle {
            width: 54px;
            height: 54px;
            background: rgba(230, 245, 255, 0.15);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 300;
            color: #ddf0ff;
            box-shadow: 0 6px 0 #0e1a24, 0 8px 16px rgba(0,0,0,0.5), inset 0 2px 4px #b0daff;
            transition: all 0.12s ease;
            border: 1px solid rgba(255,255,240,0.3);
            backdrop-filter: blur(6px);
        }
        
        #modeToggle:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #0e1a24, 0 6px 12px rgba(0,0,0,0.5), inset 0 2px 4px white;
        }
        
        #modeToggle img {
            width: 32px;
            height: 32px;
            filter: invert(1) brightness(1.2);
        }
        
        #shadow {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 32px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03), 0 18px 30px -10px black;
            position: relative;
            display: flex;
            justify-content: center;
        }
        
        canvas {
            display: block;
            border-radius: 20px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 20px 30px -12px black;
            background: #1e2b36;
        }
        
        #hint {
            background: rgba(20, 30, 40, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 48px;
            box-shadow: 0 30px 50px -20px black, 0 0 0 1px rgba(255,255,255,0.1);
            overflow: hidden;
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255,255,255,0.15);
        }
        
        .animati1 {
            opacity: 0;
            visibility: hidden;
            transform: translate(-50%, -30%) scale(0.9);
        }
        
        .animati2 {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }
        
        .hbg {
            background: transparent;
            padding: 32px 36px;
            text-align: center;
            min-width: 280px;
        }
        
        #load {
            font-size: 24px;
            color: #b0e0ff;
            padding: 20px;
        }
        
        #text p {
            font-size: 26px;
            color: #f5c6a0;
            margin: 16px 0 12px;
            text-shadow: 0 2px 6px #ffb56b;
            line-height: 1.4;
        }
        
        #butt {
            background: linear-gradient(145deg, #2e4357, #1b2a38);
            display: inline-block;
            padding: 14px 36px;
            border-radius: 60px;
            font-size: 22px;
            font-weight: 500;
            color: #e2f0fa;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 8px 0 #0d1a22, 0 8px 18px rgba(0,0,0,0.4);
            transition: 0.08s linear;
            border: 1px solid rgba(255,255,255,0.08);
        }
        
        #butt:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #0d1a22, 0 8px 18px rgba(0,0,0,0.4);
        }
        
        /* 响应式设计 */
        @media (max-width: 1024px) {
            .game-layout {
                flex-wrap: wrap;
            }
            
            .control-panel {
                width: 320px;
                max-height: none;
            }
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .game-layout {
                gap: 15px;
                padding: 10px;
            }
            
            .control-panel {
                width: 100%;
                max-width: 400px;
                padding: 15px;
                border-radius: 32px;
            }
            
            #Mclear {
                padding: 16px;
            }
            
            .title {
                padding: 4px 8px 4px 16px;
                margin-bottom: 16px;
            }
            
            #time, #tabnum {
                font-size: 20px;
                padding: 3px 10px;
                min-width: 70px;
            }
            
            #restart {
                width: 48px;
                height: 48px;
                font-size: 28px;
            }
            
            #shadow {
                padding: 12px;
            }
            
            canvas {
                border-radius: 16px;
            }
        }
        
        @media (max-width: 480px) {
            .control-panel {
                padding: 12px;
            }
            
            .panel-title {
                font-size: 20px;
            }
            
            .group-title {
                font-size: 16px;
            }
            
            .btn {
                padding: 10px 20px;
                font-size: 14px;
            }
            
            .btn.small {
                padding: 6px 12px;
                font-size: 12px;
            }
            
            .status-area {
                font-size: 20px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
<div class="game-layout">
    <!-- 左侧控制面板 -->
    <div class="control-panel left-panel">
        <div class="panel-title">扫雷</div>
        <div class="group-title">难度</div>
        <div class="button-row">
            <button class="btn small" id="diff0">简单</button>
            <button class="btn small" id="diff1">一般</button>
            <button class="btn small" id="diff2">困难</button>
        </div>
        <div class="group-title">控制</div>
        <button class="btn full-width" id="restartBtn">&#8635; 新局</button>
        <div class="status-area" id="statusArea">请选择难度</div>
    </div>

    <!-- 中央游戏区域 -->
    <div id="Mclear">
        <div class="title">
            <div id="time">000</div>
            <div id="modeToggle" title="切换模式">
                <img id="exploreIcon" src="./explore.svg" style="display: block;">
                <img id="flagIcon" src="./flag.svg" style="display: none;">
            </div>
            <div id="tabnum">000</div>
        </div>
        <div id="shadow">
            <canvas id="canvas" width="300" height="400"></canvas>
            <!-- 浮层 -->
            <div id="hint" class="animati1">
                <div class="hbg">
                    <div id="load" style="display: none;">加载中...</div>
                    <div id="text" style="display: none;">
                        <p>&#128165; 踩到炸弹啦 &#128165;<br>再试一次</p>
                        <span id="butt">再来一局</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 右侧控制面板 -->
    <div class="control-panel right-panel">
        <div class="panel-title">信息</div>
        <div class="group-title">玩法介绍</div>
        <div style="padding: 0 12px; line-height: 1.4; font-size: 14px;">
            <p>• <b>铲子图标：探索模式</b></p>
            <p>  - 左键：探索格子</p>
            <p>  - 右键：插旗/拔旗</p>
            <p> </p>
            <p>• <b>红旗图标：标记模式</b></p>
            <p>  - 左键：插旗/拔旗</p>
            <p>  - 右键：探索格子</p>
        </div>
        <div class="group-title">作者链接</div>
        <a href="https://www.52pojie.cn/thread-2098097-1-1.html" class="btn full-width" target="_blank">经典扫雷 专业版2.0</a>
    </div>
</div>

<script>
(function() {
    'use strict';

    // 常量定义
    const CELL_SIZE = 30;
    const SHADOW_PADDING = 16;      // #shadow的内边距
    const BORDER_COLOR = '#2d3e4f';
    const COVER_INNER = '#a3b9d1';
    const OPEN_INNER = '#f2f6fc';
    const MAX_TIME = 999;

    // DOM 快捷获取
    const $ = id => document.getElementById(id);
    const canvas = $('canvas');
    const ctx = canvas.getContext('2d');
    const timeDiv = $('time');
    const tabnumDiv = $('tabnum');
    const hintDiv = $('hint');
    const textDiv = $('text');
    const modeToggle = $('modeToggle');
    const exploreIcon = $('exploreIcon');
    const flagIcon = $('flagIcon');
    const butt = $('butt');
    const statusArea = $('statusArea');

    // 游戏状态变量
    let gridCanvas = null;          // 网格离屏canvas（已无网格，仅作占位）
    let cellCanvas = null;          // 方块离屏canvas
    let map = [];                   // 二维数组，存储每个格子的对象
    let stageWidth = 300;
    let stageHeight = 400;
    let difficulty = '简单';
    let rows = 0, cols = 0;
    let mineCount = 0;              // 总雷数
    let flaggedCount = 0;           // 已插旗数
    let correctFlagCount = 0;       // 标记正确的雷数
    let elapsedSeconds = 0;
    let gameActive = false;
    let timerInterval = null;
    let pendingCoord = null;        // 按下的格子坐标
    let isExploreMode = true;       // true: 探索模式, false: 标记模式
    let adjustedCellSize = CELL_SIZE; // 调整后的单元格大小

    // 初始化
    function init() {
        // 隐藏提示层
        hintDiv.className = 'animati1';
        textDiv.style.display = 'none';
        
        // 绑定难度选择按钮事件
        $('diff0').addEventListener('click', () => startGame('简单'));
        $('diff1').addEventListener('click', () => startGame('一般'));
        $('diff2').addEventListener('click', () => startGame('困难'));
        
        // 绑定新局按钮事件
        $('restartBtn').addEventListener('click', showDifficulty);
        
        // 绑定模式切换按钮事件
        modeToggle.addEventListener('click', toggleMode);
    }
    
    // 切换模式
    function toggleMode() {
        isExploreMode = !isExploreMode;
        if (isExploreMode) {
            exploreIcon.style.display = 'block';
            flagIcon.style.display = 'none';
            modeToggle.title = '切换到标记模式';
        } else {
            exploreIcon.style.display = 'none';
            flagIcon.style.display = 'block';
            modeToggle.title = '切换到探索模式';
        }
    }

    // 显示难度选择
    function showDifficulty() {
        gameActive = false;
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        statusArea.textContent = '请选择难度';
        hintDiv.className = 'animati1';
    }

    // 开始游戏
    function startGame(diff) {
        difficulty = diff;
        resetGame();
        hintDiv.className = 'animati1';
        initMap();
        statusArea.textContent = `难度: ${difficulty}`;
    }

    // ----- 绘制函数（精确居中，无偏移）-----
    function fillCellBase(destCtx, col, row, innerColor) {
        const x = col * adjustedCellSize, y = row * adjustedCellSize;
        destCtx.fillStyle = BORDER_COLOR;
        destCtx.fillRect(x, y, adjustedCellSize, adjustedCellSize);
        destCtx.fillStyle = innerColor;
        destCtx.fillRect(x + 1, y + 1, adjustedCellSize - 2, adjustedCellSize - 2);
    }

    function drawCovered(destCtx, col, row) {
        fillCellBase(destCtx, col, row, COVER_INNER);
    }

    function drawOpenedBase(destCtx, col, row) {
        fillCellBase(destCtx, col, row, OPEN_INNER);
    }

    function drawNumber(destCtx, col, row, num) {
        drawOpenedBase(destCtx, col, row);
        if (num > 0) {
            const x = col * adjustedCellSize + adjustedCellSize/2;
            const y = row * adjustedCellSize + adjustedCellSize/2;
            const fontSize = Math.max(16, Math.min(24, adjustedCellSize * 0.8));
            destCtx.font = `bold ${fontSize}px "JetBrains Mono", "Segoe UI", monospace`;
            const colors = ['#2673b3', '#2b7a4b', '#c44536', '#8a4f9e', '#b3444a', '#3f6a7a', '#4a4a4a', '#2673b3'];
            destCtx.fillStyle = colors[(num-1) % colors.length];
            destCtx.textAlign = 'center';
            destCtx.textBaseline = 'middle';
            destCtx.fillText(num, x, y);
        }
    }

    function drawEmpty(destCtx, col, row) {
        drawOpenedBase(destCtx, col, row);
    }

    function drawFlag(destCtx, col, row) {
        drawCovered(destCtx, col, row);
        const x = col * adjustedCellSize + adjustedCellSize/2;
        const y = row * adjustedCellSize + adjustedCellSize/2;
        const fontSize = Math.max(16, Math.min(24, adjustedCellSize * 0.8));
        destCtx.font = `${fontSize}px "Segoe UI Emoji", "Apple Color Emoji", sans-serif`;
        destCtx.fillStyle = '#dc5f4c';
        destCtx.textAlign = 'center';
        destCtx.textBaseline = 'middle';
        destCtx.fillText('🚩', x, y);
    }

    function drawMine(destCtx, col, row, isRed = false) {
        const x = col * adjustedCellSize, y = row * adjustedCellSize;
        destCtx.fillStyle = BORDER_COLOR;
        destCtx.fillRect(x, y, adjustedCellSize, adjustedCellSize);
        destCtx.fillStyle = isRed ? '#f6cfcf' : OPEN_INNER;
        destCtx.fillRect(x + 1, y + 1, adjustedCellSize - 2, adjustedCellSize - 2);
        const cx = x + adjustedCellSize/2;
        const cy = y + adjustedCellSize/2;
        const fontSize = Math.max(16, Math.min(24, adjustedCellSize * 0.8));
        destCtx.font = `${fontSize}px "Segoe UI Emoji", "Apple Color Emoji"`;
        destCtx.fillStyle = '#2e2e2e';
        destCtx.textAlign = 'center';
        destCtx.textBaseline = 'middle';
        destCtx.fillText('💣', cx, cy);
    }

    // 更新数字显示
    function updateCounters() {
        const remain = Math.max(0, mineCount - flaggedCount);
        tabnumDiv.innerText = remain.toString().padStart(3, '0');
        timeDiv.innerText = elapsedSeconds.toString().padStart(3, '0');
    }

    // 重置游戏（不生成新地图，只清空状态）
    function resetGame() {
        gridCanvas = null;
        cellCanvas = null;
        map = [];
        pendingCoord = null;
        correctFlagCount = 0;
        flaggedCount = 0;
        mineCount = 0;
        elapsedSeconds = 0;
        gameActive = false;
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        updateCounters();
    }

    // 生成随机地雷（Fisher-Yates 洗牌）
    function generateMines(totalCells, mineNum) {
        const indices = Array.from({ length: totalCells }, (_, i) => i);
        for (let i = 0; i < mineNum; i++) {
            const j = i + Math.floor(Math.random() * (totalCells - i));
            [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        return indices.slice(0, mineNum).sort((a, b) => a - b);
    }

    // 初始化地图
    function initMap() {
        // 根据难度确定行列和雷数
        switch (difficulty) {
            case '简单': cols = 10; mineCount = 10; break;
            case '一般': cols = 20; mineCount = 40; break;
            case '困难': cols = 30; mineCount = 120; break;
            default: cols = 10; mineCount = 10;
        }
        
        // 计算屏幕宽度，限制canvas最大宽度
        const screenWidth = window.innerWidth;
        const maxCanvasWidth = screenWidth - 80; // 留边距
        
        // 计算基础宽度
        let width = cols * CELL_SIZE;
        
        // 如果宽度超过屏幕宽度，调整CELL_SIZE
        adjustedCellSize = CELL_SIZE;
        if (width > maxCanvasWidth) {
            adjustedCellSize = Math.floor(maxCanvasWidth / cols);
            width = adjustedCellSize * cols;
        }
        
        // 高度根据视口自适应，但保证至少有一行，且为CELL_SIZE整数倍
        const maxHeight = window.innerHeight - 200;
        let height = (width > maxHeight) ? maxHeight - (maxHeight % adjustedCellSize) : width;
        if (height < adjustedCellSize) height = adjustedCellSize;
        rows = Math.floor(height / adjustedCellSize);

        stageWidth = width;
        stageHeight = rows * adjustedCellSize;
        canvas.width = stageWidth;
        canvas.height = stageHeight;

        // 创建网格画布（已无网格线，仅保留占位）
        gridCanvas = document.createElement('canvas');
        gridCanvas.width = stageWidth;
        gridCanvas.height = stageHeight;
        // 不绘制任何线条

        // 创建方块画布
        cellCanvas = document.createElement('canvas');
        cellCanvas.width = stageWidth;
        cellCanvas.height = stageHeight;
        const cellCtx = cellCanvas.getContext('2d');

        // 生成雷索引
        const totalCells = rows * cols;
        const mineIndices = generateMines(totalCells, mineCount);

        // 构建地图数组
        map = Array.from({ length: rows }, (_, r) =>
            Array.from({ length: cols }, (_, c) => {
                const idx = r * cols + c;
                const isMine = mineIndices.includes(idx);
                return {
                    mine: isMine,
                    covered: true,
                    flagged: false,
                    num: 0
                };
            })
        );

        // 计算周围雷数
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                if (map[r][c].mine) continue;
                let cnt = 0;
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        const nr = r + dr, nc = c + dc;
                        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && map[nr][nc].mine) cnt++;
                    }
                }
                map[r][c].num = cnt;
            }
        }

        // 绘制所有格子为覆盖状态
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                drawCovered(cellCtx, c, r);
            }
        }

        // 显示到主canvas
        ctx.clearRect(0, 0, stageWidth, stageHeight);
        ctx.drawImage(cellCanvas, 0, 0);

        gameActive = true;
        updateCounters();

        // 启动计时器
        if (timerInterval) clearInterval(timerInterval);
        elapsedSeconds = 0;
        timerInterval = setInterval(() => {
            if (!gameActive) return;
            if (elapsedSeconds >= MAX_TIME) {
                gameOver(false);
                return;
            }
            elapsedSeconds++;
            updateCounters();
        }, 1000);
    }

    // 刷新主画布（从离屏画布复制）
    function redrawScene() {
        ctx.clearRect(0, 0, stageWidth, stageHeight);
        if (gridCanvas) ctx.drawImage(gridCanvas, 0, 0);
        if (cellCanvas) ctx.drawImage(cellCanvas, 0, 0);
    }

    // 获取鼠标在canvas上的格子坐标（返回 { row, col } 或 null）
    function getCellFromEvent(e) {
        const shadowRect = $('shadow').getBoundingClientRect();
        // 计算相对于canvas的坐标（减去shadow内边距）
        const canvasX = e.clientY - shadowRect.top - SHADOW_PADDING;
        const canvasY = e.clientX - shadowRect.left - SHADOW_PADDING;
        if (canvasX < 0 || canvasY < 0 || canvasX >= stageHeight || canvasY >= stageWidth) return null;
        const row = Math.floor(canvasX / adjustedCellSize);
        const col = Math.floor(canvasY / adjustedCellSize);
        if (row < 0 || row >= rows || col < 0 || col >= cols) return null;
        return { row, col };
    }

    // 按下处理
    function onMouseDown(e) {
        if (!gameActive) return;
        const cell = getCellFromEvent(e);
        if (!cell) return;
        const { row, col } = cell;
        if (!map[row]?.[col]?.covered) return;
        pendingCoord = { row, col };
        // 显示按下效果
        redrawScene();
        ctx.globalAlpha = 0.2;
        ctx.fillStyle = '#2f4f6f';
        ctx.fillRect(col * adjustedCellSize, row * adjustedCellSize, adjustedCellSize, adjustedCellSize);
        ctx.globalAlpha = 1.0;
    }

    // 弹起处理
    function onMouseUp(e) {
        if (!gameActive || !pendingCoord) return;
        const start = pendingCoord;
        pendingCoord = null;

        const end = getCellFromEvent(e);
        if (!end) {
            redrawScene();
            return;
        }

        const { row: sRow, col: sCol } = start;
        const { row: eRow, col: eCol } = end;
        const cell = map[sRow]?.[sCol];
        if (!cell || !cell.covered) return;

        const cellCtx = cellCanvas.getContext('2d');

        // 根据模式执行不同操作
        if (isExploreMode) {
            // 探索模式：左键探索，右键插旗
            if (e.button === 0) {
                // 左键：探索
                if (sRow === eRow && sCol === eCol && !cell.flagged) {
                    if (cell.mine) {
                        // 踩雷：显示所有雷
                        cell.covered = false;
                        drawMine(cellCtx, sCol, sRow, true);
                        for (let r = 0; r < rows; r++) {
                            for (let c = 0; c < cols; c++) {
                                if (map[r][c].mine && !(r === sRow && c === sCol)) {
                                    map[r][c].covered = false;
                                    drawMine(cellCtx, c, r, false);
                                }
                            }
                        }
                        gameOver(false);
                    } else {
                        if (cell.num === 0) {
                            expandEmpty(sRow, sCol);
                        } else {
                            cell.covered = false;
                            drawNumber(cellCtx, sCol, sRow, cell.num);
                        }
                    }
                }
            } else if (e.button === 2) {
                // 右键：插旗/拔旗
                if (sRow === eRow && sCol === eCol) {
                    if (!cell.flagged && flaggedCount < mineCount) {
                        cell.flagged = true;
                        flaggedCount++;
                        if (cell.mine) correctFlagCount++;
                        drawFlag(cellCtx, sCol, sRow);
                        updateCounters();
                        if (correctFlagCount === mineCount) gameOver(true);
                    } else if (cell.flagged) {
                        cell.flagged = false;
                        flaggedCount--;
                        if (cell.mine) correctFlagCount--;
                        drawCovered(cellCtx, sCol, sRow);
                        updateCounters();
                    }
                }
            }
        } else {
            // 标记模式：左键插旗，右键探索
            if (e.button === 0) {
                // 左键：插旗/拔旗
                if (sRow === eRow && sCol === eCol) {
                    if (!cell.flagged && flaggedCount < mineCount) {
                        cell.flagged = true;
                        flaggedCount++;
                        if (cell.mine) correctFlagCount++;
                        drawFlag(cellCtx, sCol, sRow);
                        updateCounters();
                        if (correctFlagCount === mineCount) gameOver(true);
                    } else if (cell.flagged) {
                        cell.flagged = false;
                        flaggedCount--;
                        if (cell.mine) correctFlagCount--;
                        drawCovered(cellCtx, sCol, sRow);
                        updateCounters();
                    }
                }
            } else if (e.button === 2) {
                // 右键：探索
                if (sRow === eRow && sCol === eCol && !cell.flagged) {
                    if (cell.mine) {
                        // 踩雷：显示所有雷
                        cell.covered = false;
                        drawMine(cellCtx, sCol, sRow, true);
                        for (let r = 0; r < rows; r++) {
                            for (let c = 0; c < cols; c++) {
                                if (map[r][c].mine && !(r === sRow && c === sCol)) {
                                    map[r][c].covered = false;
                                    drawMine(cellCtx, c, r, false);
                                }
                            }
                        }
                        gameOver(false);
                    } else {
                        if (cell.num === 0) {
                            expandEmpty(sRow, sCol);
                        } else {
                            cell.covered = false;
                            drawNumber(cellCtx, sCol, sRow, cell.num);
                        }
                    }
                }
            }
        }

        redrawScene();
    }

    // 展开空白区域（广度优先）
    function expandEmpty(startRow, startCol) {
        const cellCtx = cellCanvas.getContext('2d');
        const queue = [{ row: startRow, col: startCol }];
        while (queue.length) {
            const { row, col } = queue.shift();
            const cell = map[row]?.[col];
            if (!cell || !cell.covered || cell.flagged || cell.mine) continue;

            cell.covered = false;
            if (cell.num === 0) {
                drawEmpty(cellCtx, col, row);
            } else {
                drawNumber(cellCtx, col, row, cell.num);
                continue;
            }

            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    const nr = row + dr, nc = col + dc;
                    if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
                    const neighbor = map[nr][nc];
                    if (neighbor.covered && !neighbor.flagged && !neighbor.mine) {
                        if (neighbor.num === 0) {
                            queue.push({ row: nr, col: nc });
                        } else {
                            neighbor.covered = false;
                            drawNumber(cellCtx, nc, nr, neighbor.num);
                        }
                    }
                }
            }
        }
    }

    // 游戏结束
    function gameOver(isWin) {
        gameActive = false;
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }

        const msg = textDiv.querySelector('p');
        if (isWin) {
            msg.innerHTML = `&#127881; 胜利！ &#127881;<br>用时 ${elapsedSeconds} 秒`;
            butt.innerText = '再玩一局';
        } else {
            msg.innerHTML = '&#128165; 踩到炸弹啦 &#128165;<br>再来一次';
            butt.innerText = '重新开始';
        }
        textDiv.style.display = 'block';
        hintDiv.className = 'animati2';
    }

    // 暴露给全局的难度选择函数
    window.Difficulty = function(diff) {
        startGame(diff);
    };

    // 事件绑定
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('mousedown', onMouseDown);
    document.addEventListener('mouseup', onMouseUp);
    butt.addEventListener('click', function() {
        textDiv.style.display = 'none';
        hintDiv.className = 'animati1';
        showDifficulty();
    });
    
    // 初始化
    init();
})();
</script>
</body>
</html>
